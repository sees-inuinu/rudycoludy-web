<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rudy.co.ludy</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page detail-page">
      <header class="top-bar">
        <a href="index.html" class="back">← BACK</a>
        <div class="menu">MENU ⠿</div>
      </header>

      <section class="story-meta">
        <div class="story-meta-item" id="storyTitle">
          STORY TITLE
          <span>＋</span>
        </div>

        <div class="story-meta-item" id="storyDescription">
          STORY DESCRIPTION
          <span>＋</span>
        </div>
      </section>

      <section class="chat-box" id="chatBox">
        <div class="chat-message right colune">
          <div class="chat-body">
            <div class="chat-name-colune"></div>
            <div class="chat-bubble"></div>
          </div>
          <img class="chat-icon" src="images/colune.png" alt="COLUNE" />
        </div>

        <div class="chat-message left rudy">
          <img class="chat-icon" src="images/rudy.png" alt="RUDY" />
          <div class="chat-body">
            <div class="chat-name"></div>
            <div class="chat-bubble"></div>
          </div>
        </div>
      </section>

      <section class="story-gallery-section">
        <button class="gallery-button prev" id="galleryPrev">←</button>

        <div class="story-gallery-viewport">
          <div class="story-gallery-track" id="storyGallery"></div>
        </div>

        <button class="gallery-button next" id="galleryNext">→</button>
      </section>

      <section class="story-section other">
        <div class="section-title">
          <span>■</span>
          OTHER STORY
        </div>

        <div class="story-list">
          <a href="story.html?id=4" class="story-card">
            <div class="image-box">＋</div>
            <div class="story-info">
              <div>
                <h2>STORY 04</h2>
                <p>MAY 07, 2026</p>
              </div>
              <span>→</span>
            </div>
          </a>

          <a href="story.html?id=5" class="story-card">
            <div class="image-box">＋</div>
            <div class="story-info">
              <div>
                <h2>STORY 05</h2>
                <p>MAY 06, 2026</p>
              </div>
              <span>→</span>
            </div>
          </a>

          <a href="story.html?id=6" class="story-card">
            <div class="image-box">＋</div>
            <div class="story-info">
              <div>
                <h2>STORY 06</h2>
                <p>MAY 05, 2026</p>
              </div>
              <span>→</span>
            </div>
          </a>
        </div>
      </section>
    </main>
    <script src="js/stories.js"></script>
    <script src="js/story.js"></script>
  </body>
</html>
